  push-docker-images:
    name: Build and Attest Docker Images
    runs-on: ubuntu-latest
    #if: github.ref == 'refs/heads/master' && github.repository_owner == 'holo-routing'
    permissions:
      id-token: write
      attestations: write
      packages: write
    strategy:
      matrix:
        image:
          - name: holod
            dockerfile: docker/Dockerfile.holod
          - name: holo-bundle
            dockerfile: docker/Dockerfile.holo-bundle
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and push ${{ matrix.image.name }} image
        id: push_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ghcr.io/holo-routing/${{ matrix.image.name }}:latest
      - name: Attest ${{ matrix.image.name }} image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/holo-routing/${{ matrix.image.name }}
          subject-digest: ${{ steps.push_image.outputs.digest }}
          push-to-registry: true
